name: Weekly summary

on:
  schedule:
    # Saturday 13:00 UTC = 9 AM ET (EDT) / 8 AM ET (EST) — friendly morning delivery
    - cron: '0 13 * * 6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: momentum-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Read rolling state from the scan workflow's cache so weekly.py sees
      # the accumulated events log.
      - name: Restore scanner state cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: momentum-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            momentum-state-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: python -m scanner.weekly --verbose

      - name: Commit weekly summary
        run: |
          git config user.name "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          git add data/weekly.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No weekly data to commit"
            exit 0
          fi
          git commit -m "weekly: $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected; pulling --rebase"
            git pull --rebase -X theirs origin main
            sleep 2
          done
          exit 1
