name: CI

# Quality gate: lint + types + tests on every push and PR. The cron workflows
# (scan/serenity/weekly) run the scanner; this one guards the code.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check scanner/ tests/

      - name: Mypy (types — risk + grading, scoped via pyproject)
        run: mypy

      - name: Pytest
        run: pytest -q
